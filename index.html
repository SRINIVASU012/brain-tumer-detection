<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-Gen Tumor Detection | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Next-Gen Tumor Detection</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="upload.html">Upload MRI</a></li>
                <li><a href="result.html">Result</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <main class="home-container">
        <section class="body-section section-form">
            <div class="card">
                <h2>Patient Registration</h2>
                <p>Please enter patient details before proceeding to scan analysis.</p>
                <form id="patient-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Enter name" required>
                    </div>
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="tel" placeholder="Enter 10-digit number" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Age</label>
                            <input type="number" placeholder="Years">
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <select>
                                <option>Male</option>
                                <option>Female</option>
                                <option>Other</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary w-100">Save & Proceed to Upload</button>
                </form>
            </div>
        </section>

        <section class="body-section section-image">
            <div class="image-wrapper">
                <img src="https://images.unsplash.com/photo-1559757175-5700dde675bc?auto=format&fit=crop&q=80&w=1000" alt="Brain MRI Analysis">
                <div class="overlay-text">
                    <h3>AI-Driven Diagnostics</h3>
                    <p>98% Classification Accuracy using CNN & Fuzzy Logic</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Next-Gen Tumor Detection Project | Medical AI Interface</p>
    </footer>
</body>
</html>
